# Default Agent Roster
#   Static agent roster for Mission Control dispatch.
#   Each entry defines what the Planning Agent can select from.
#   Models are pinned — no runtime override (P2, research doc 11).
#
#   Planning and verification agents are included below and will be
#   used as defaults if not already present in the roster.

agents:
  - agent_name: code.quality.agent
    agent_version: "1.0.0"
    description: >
      Audits Python codebases for compliance violations including import
      patterns, datetime usage, hardcoded values, and file size limits.
      Returns structured findings with severity ratings and recommendations.
      Read-only — does not modify files (P13).
    model:
      name: "anthropic:claude-haiku-4-5-20251001"
      temperature: 0.0
      max_tokens: 4096
    tools:
      - compliance.load_project_standards
      - filesystem.read_file
      - filesystem.list_files
      - compliance.scan_imports
      - compliance.scan_datetime
      - compliance.scan_hardcoded
      - compliance.scan_file_sizes
    interface:
      input:
        target_path: string
        scan_rules: "list[string]"
      output:
        summary: string
        total_violations: integer
        error_count: integer
        warning_count: integer
        violations: "list[object]"
        scanned_files_count: integer
    constraints:
      timeout_seconds: 120
      cost_ceiling_usd: 0.50
      retry_budget: 2
      parallelism: safe

  - agent_name: system.health.agent
    agent_version: "1.0.0"
    description: >
      Read-only platform health audit: scans logs for errors, validates config
      files and secrets, checks dependency consistency, verifies project file
      structure. Reports but does not fix (P13).
    model:
      name: "anthropic:claude-haiku-4-5-20251001"
      temperature: 0.0
      max_tokens: 4096
    tools:
      - system.check_services
      - system.scan_log_errors
      - system.validate_config
      - system.check_dependencies
      - system.check_file_structure
      - system.get_app_info
    interface:
      input:
        query: string
      output:
        summary: string
        overall_status: string
        findings: "list[object]"
        error_count: integer
        warning_count: integer
        checks_performed: "list[string]"
    constraints:
      timeout_seconds: 120
      cost_ceiling_usd: 0.25
      retry_budget: 2
      parallelism: safe

  - agent_name: horizontal.planning.agent
    agent_version: "1.0.0"
    description: >
      Decomposes mission briefs into executable task plans with dependency
      graphs, verification specs, and cost estimates.
    model:
      name: "anthropic:claude-opus-4-20250514"
      temperature: 0.0
      max_tokens: 16384
    tools: []
    interface:
      input:
        mission_brief: string
        roster: object
        upstream_context: object
      output:
        task_plan: object
    constraints:
      timeout_seconds: 300
      cost_ceiling_usd: 5.0
      retry_budget: 2
      parallelism: unsafe

  - agent_name: horizontal.verification.agent
    agent_version: "1.0.0"
    description: >
      Evaluates agent output quality against criteria. Used in Tier 3
      verification.
    model:
      name: "anthropic:claude-opus-4-20250514"
      temperature: 0.0
      max_tokens: 8192
    tools: []
    interface:
      input:
        task_instructions: string
        evaluation_criteria: "list[string]"
        agent_output: object
      output:
        overall_score: float
        pass: bool
        criteria_results: "list[object]"
    constraints:
      timeout_seconds: 180
      cost_ceiling_usd: 3.0
      retry_budget: 1
      parallelism: unsafe
