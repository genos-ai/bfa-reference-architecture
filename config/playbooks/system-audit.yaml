# =============================================================================
# Playbook: Platform Self-Audit
# =============================================================================
# Full platform audit using code quality and system health agents in parallel.
# Demonstrates: multi-agent dispatch, parallel execution, the full
# Planning Agent → TaskPlan → dispatch → verify pipeline.
# =============================================================================

playbook_name: system.audit
description: "Run compliance scans and health checks in parallel"
objective:
  statement: "Audit the platform for compliance violations and system health issues"
  category: operations
  owner: platform-team
  priority: normal
  regulatory_reference: null
version: 2
enabled: true

trigger:
  type: on_demand
  match_patterns:
    - "platform audit"
    - "self audit"
    - "system audit"
    - "platform check"

budget:
  max_cost_usd: 2.00
  max_tokens: 200000

context:
  target_path: "modules"
  scan_rules:
    - no_relative_imports
    - no_datetime_now
    - no_hardcoded_values
    - yaml_header_comment

steps:
  - id: code-quality
    description: "Scan codebase for compliance violations"
    capability: code.qa
    roster: default
    complexity_tier: simple
    cost_ceiling_usd: 0.75
    environment: local
    input:
      target_path: "@context.target_path"
      scan_rules: "@context.scan_rules"
    output_mapping:
      field_mappings:
        - source_task: code.qa.agent
          source_field: violations
          target_key: code_violations
    timeout_seconds: 120
    depends_on: []

  - id: health-check
    description: "Run full system health audit"
    capability: system.health
    roster: default
    complexity_tier: simple
    cost_ceiling_usd: 0.50
    environment: local
    input:
      query: "Run all six health checks: check service connectivity (PostgreSQL, Redis), scan logs for errors, validate config files, check dependencies, verify file structure, and get app info"
    output_mapping:
      field_mappings:
        - source_task: system.health.agent
          source_field: findings
          target_key: health_findings
    timeout_seconds: 120
    depends_on: []
